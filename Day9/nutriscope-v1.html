<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriScope - Nutrition Tracking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-darker: #0a0f1a;
            --card-bg: #1e293b;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --chart-primary: #6366f1;
            --chart-secondary: #8b5cf6;
            --chart-success: #10b981;
            --chart-warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, var(--primary), var(--chart-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: border 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--card-bg), rgba(99, 102, 241, 0.1));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin: 10px 0;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-unit {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--chart-secondary));
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .food-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .food-table thead {
            background: var(--bg-dark);
        }

        .food-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .food-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .food-table tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .food-table input {
            width: 100%;
            padding: 6px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }

        .nutrient-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nutrient-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(99, 102, 241, 0.05);
            border-left: 3px solid var(--primary);
            border-radius: 6px;
        }

        .nutrient-name {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nutrient-name-label {
            font-weight: 600;
            font-size: 14px;
        }

        .nutrient-value {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .recommendation {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(99, 102, 241, 0.1));
            border-left: 3px solid var(--success);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .recommendation.warning {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(99, 102, 241, 0.1));
            border-left-color: var(--warning);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .deficiency-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .deficiency-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid var(--danger);
            border-radius: 6px;
            font-size: 13px;
        }

        .excess-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(245, 158, 11, 0.1);
            border-left: 3px solid var(--warning);
            border-radius: 6px;
            font-size: 13px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            background: var(--primary);
            color: white;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.secondary {
            background: var(--chart-secondary);
        }

        .badge.success {
            background: var(--success);
        }

        .badge.warning {
            background: var(--warning);
            color: #000;
        }

        .macro-box {
            background: linear-gradient(135deg, var(--card-bg), rgba(99, 102, 241, 0.1));
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-bottom: 10px;
        }

        .macro-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }

        .macro-value {
            font-size: 24px;
            font-weight: 700;
            margin: 8px 0;
            background: linear-gradient(135deg, var(--primary), var(--chart-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .macro-target {
            font-size: 12px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header h1 {
                font-size: 24px;
            }

            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .food-table {
                font-size: 12px;
            }

            .food-table th,
            .food-table td {
                padding: 8px;
            }

            .modal-content {
                padding: 20px;
                width: 95%;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍎 NutriScope</h1>
            <div class="header-buttons">
                <button class="btn btn-secondary" onclick="switchSection('profile')">Profile</button>
                <button class="btn btn-secondary" onclick="switchSection('logging')">Food Log</button>
                <button class="btn btn-secondary" onclick="switchSection('dashboard')">Dashboard</button>
                <button class="btn btn-primary" onclick="resetAllData()">Reset Data</button>
            </div>
        </div>

        <!-- Profile Section -->
        <section id="profile" class="section active">
            <div class="card">
                <h2>Your Health Profile</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Age (years)</label>
                        <input type="number" id="age" min="1" max="120" placeholder="25">
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Height (cm)</label>
                        <input type="number" id="height" min="50" max="250" placeholder="170">
                    </div>
                    <div class="form-group">
                        <label>Weight (kg)</label>
                        <input type="number" id="weight" min="20" max="300" placeholder="70">
                    </div>
                    <div class="form-group">
                        <label>Activity Level</label>
                        <select id="activityLevel">
                            <option value="sedentary">Sedentary (little/no exercise)</option>
                            <option value="light">Light (1-3 days/week)</option>
                            <option value="moderate">Moderate (3-5 days/week)</option>
                            <option value="very">Very Active (6-7 days/week)</option>
                            <option value="extreme">Extreme (physical job)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Dietary Preference</label>
                        <select id="dietaryPreference">
                            <option value="non-vegetarian">Non-Vegetarian</option>
                            <option value="vegetarian">Vegetarian</option>
                            <option value="eggetarian">Eggetarian</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
            </div>

            <div class="grid-3">
                <div class="stat-card">
                    <div class="stat-label">Basal Metabolic Rate</div>
                    <div class="stat-value" id="bmr">0</div>
                    <div class="stat-unit">kcal/day</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Daily Energy Need</div>
                    <div class="stat-value" id="tdee">0</div>
                    <div class="stat-unit">kcal/day</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">BMI</div>
                    <div class="stat-value" id="bmi">0</div>
                    <div class="stat-unit">kg/m²</div>
                </div>
            </div>
        </section>

        <!-- Food Logging Section -->
        <section id="logging" class="section">
            <div class="card">
                <h2>Log Your Food</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Food Item</label>
                        <select id="foodSelect">
                            <option value="">Select a food</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="quantity" min="0" step="0.1" placeholder="100">
                    </div>
                    <div class="form-group">
                        <label>Unit</label>
                        <select id="unit">
                            <option value="g">Grams (g)</option>
                            <option value="ml">Milliliters (ml)</option>
                            <option value="piece">Piece</option>
                            <option value="cup">Cup</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="addFood()">Add Food</button>
            </div>

            <div class="card">
                <h2>Today's Food Log</h2>
                <div id="foodTableContainer"></div>
            </div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard" class="section">
            <div class="grid-2">
                <div class="card">
                    <h2>Energy Progress</h2>
                    <div class="chart-container">
                        <canvas id="energyChart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <h2>Macronutrients</h2>
                    <div class="chart-container">
                        <canvas id="macroChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="grid-2">
                <div class="card">
                    <h2>Macro Breakdown</h2>
                    <div id="macroBreakdown"></div>
                </div>
                <div class="card">
                    <h2>Key Nutrients</h2>
                    <div class="nutrient-list" id="nutrientList"></div>
                </div>
            </div>

            <div class="grid-2">
                <div class="card">
                    <h2>🔴 Top Deficiencies</h2>
                    <div id="deficiencies" class="deficiency-list"></div>
                </div>
                <div class="card">
                    <h2>⚠️ Top Excesses</h2>
                    <div id="excesses" class="deficiency-list"></div>
                </div>
            </div>

            <div class="card">
                <h2>💡 Recommendations</h2>
                <div id="recommendations"></div>
            </div>
        </section>
    </div>

    <script>
        // Food Database
        const foodDatabase = {
            'Rice': { protein: 2.7, carbs: 28, fat: 0.3, fiber: 0.4, iron: 0.8, calcium: 10, vitaminC: 0, vitaminD: 0, vitaminB12: 0, calories: 130 },
            'Roti': { protein: 4, carbs: 20, fat: 0.5, fiber: 2, iron: 1.5, calcium: 30, vitaminC: 0, vitaminD: 0, vitaminB12: 0, calories: 100 },
            'Dal': { protein: 8, carbs: 20, fat: 0.3, fiber: 2, iron: 3, calcium: 20, vitaminC: 0, vitaminD: 0, vitaminB12: 0, calories: 120 },
            'Paneer': { protein: 23, carbs: 1.2, fat: 25, fiber: 0, iron: 0.2, calcium: 400, vitaminC: 0, vitaminD: 0.1, vitaminB12: 0.5, calories: 318 },
            'Curd': { protein: 3.5, carbs: 2.5, fat: 3.2, fiber: 0, iron: 0.1, calcium: 100, vitaminC: 0.1, vitaminD: 0, vitaminB12: 0.3, calories: 60 },
            'Chana': { protein: 19, carbs: 27, fat: 2, fiber: 6, iron: 2, calcium: 75, vitaminC: 1, vitaminD: 0, vitaminB12: 0, calories: 164 },
            'Rajma': { protein: 8, carbs: 20, fat: 0.3, fiber: 6, iron: 2.5, calcium: 50, vitaminC: 0, vitaminD: 0, vitaminB12: 0, calories: 120 },
            'Banana': { protein: 1.1, carbs: 23, fat: 0.3, fiber: 2.6, iron: 0.3, calcium: 5, vitaminC: 8.7, vitaminD: 0, vitaminB12: 0, calories: 89 },
            'Apple': { protein: 0.3, carbs: 14, fat: 0.2, fiber: 2.4, iron: 0.1, calcium: 5, vitaminC: 5, vitaminD: 0, vitaminB12: 0, calories: 52 },
            'Milk': { protein: 3.2, carbs: 4.8, fat: 3.3, fiber: 0, iron: 0.1, calcium: 113, vitaminC: 0.5, vitaminD: 0.02, vitaminB12: 0.4, calories: 61 },
            'Oats': { protein: 10, carbs: 66, fat: 7, fiber: 10, iron: 4.3, calcium: 54, vitaminC: 0, vitaminD: 0, vitaminB12: 0, calories: 389 },
            'Bread': { protein: 9, carbs: 41, fat: 1, fiber: 2.4, iron: 4.3, calcium: 100, vitaminC: 0, vitaminD: 0.08, vitaminB12: 0, calories: 215 },
            'Egg': { protein: 13, carbs: 1.1, fat: 11, fiber: 0, iron: 1.8, calcium: 56, vitaminC: 0, vitaminD: 1.75, vitaminB12: 0.9, calories: 155 },
            'Chicken': { protein: 31, carbs: 0, fat: 3.6, fiber: 0, iron: 0.8, calcium: 15, vitaminC: 0, vitaminD: 0.1, vitaminB12: 0.3, calories: 165 },
            'Fish': { protein: 20, carbs: 0, fat: 4, fiber: 0, iron: 0.8, calcium: 12, vitaminC: 0, vitaminD: 10, vitaminB12: 2.4, calories: 120 },
            'Potato': { protein: 2, carbs: 17, fat: 0.1, fiber: 2.1, iron: 0.8, calcium: 10, vitaminC: 19, vitaminD: 0, vitaminB12: 0, calories: 77 },
            'Poha': { protein: 2, carbs: 26, fat: 0, fiber: 2, iron: 1.3, calcium: 30, vitaminC: 0, vitaminD: 0, vitaminB12: 0, calories: 110 },
            'Idli': { protein: 1.6, carbs: 14, fat: 0.1, fiber: 0, iron: 0.2, calcium: 13, vitaminC: 0, vitaminD: 0, vitaminB12: 0, calories: 60 },
            'Dosa': { protein: 2, carbs: 20, fat: 3.5, fiber: 1, iron: 0.3, calcium: 25, vitaminC: 0, vitaminD: 0, vitaminB12: 0, calories: 120 },
            'Spinach': { protein: 2.7, carbs: 3.6, fat: 0.4, fiber: 2.2, iron: 2.7, calcium: 99, vitaminC: 28, vitaminD: 0, vitaminB12: 0, calories: 23 }
        };

        // State
        let profile = {
            age: 25,
            gender: 'male',
            height: 170,
            weight: 70,
            activityLevel: 'moderate',
            dietaryPreference: 'non-vegetarian'
        };

        let foodLog = [];
        let charts = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            populateFoodSelect();
            loadData();
            updateProfileDisplay();
        });

        // Populate Food Select
        function populateFoodSelect() {
            const select = document.getElementById('foodSelect');
            Object.keys(foodDatabase).forEach(food => {
                const option = document.createElement('option');
                option.value = food;
                option.textContent = food;
                select.appendChild(option);
            });
        }

        // Save Profile
        function saveProfile() {
            profile = {
                age: parseInt(document.getElementById('age').value) || 25,
                gender: document.getElementById('gender').value,
                height: parseInt(document.getElementById('height').value) || 170,
                weight: parseInt(document.getElementById('weight').value) || 70,
                activityLevel: document.getElementById('activityLevel').value,
                dietaryPreference: document.getElementById('dietaryPreference').value
            };
            localStorage.setItem('nutriProfile', JSON.stringify(profile));
            updateProfileDisplay();
            alert('Profile saved successfully!');
        }

        // Load Data
        function loadData() {
            const saved = localStorage.getItem('nutriProfile');
            if (saved) {
                profile = JSON.parse(saved);
                document.getElementById('age').value = profile.age;
                document.getElementById('gender').value = profile.gender;
                document.getElementById('height').value = profile.height;
                document.getElementById('weight').value = profile.weight;
                document.getElementById('activityLevel').value = profile.activityLevel;
                document.getElementById('dietaryPreference').value = profile.dietaryPreference;
            }

            const savedLog = localStorage.getItem('nutriFoodLog');
            if (savedLog) {
                foodLog = JSON.parse(savedLog);
            }
        }

        // Calculate BMR
        function calculateBMR() {
            const { age, gender, height, weight } = profile;
            let bmr;
            if (gender === 'male') {
                bmr = 88.362 + (13.397 * weight) + (4.799 * height) - (5.677 * age);
            } else {
                bmr = 447.593 + (9.247 * weight) + (3.098 * height) - (4.330 * age);
            }
            return Math.round(bmr);
        }

        // Calculate TDEE
        function calculateTDEE() {
            const bmr = calculateBMR();
            const activityFactors = {
                sedentary: 1.2,
                light: 1.375,
                moderate: 1.55,
                very: 1.725,
                extreme: 1.9
            };
            return Math.round(bmr * (activityFactors[profile.activityLevel] || 1.55));
        }

        // Calculate BMI
        function calculateBMI() {
            const { height, weight } = profile;
            return (weight / ((height / 100) ** 2)).toFixed(1);
        }

        // Update Profile Display
        function updateProfileDisplay() {
            document.getElementById('bmr').textContent = calculateBMR();
            document.getElementById('tdee').textContent = calculateTDEE();
            document.getElementById('bmi').textContent = calculateBMI();
        }

        // Add Food
        function addFood() {
            const food = document.getElementById('foodSelect').value;
            const quantity = parseFloat(document.getElementById('quantity').value);
            const unit = document.getElementById('unit').value;

            if (!food || !quantity) {
                alert('Please select a food and enter quantity');
                return;
            }

            foodLog.push({
                id: Date.now(),
                food,
                quantity,
                unit,
                timestamp: new Date().toISOString()
            });

            localStorage.setItem('nutriFoodLog', JSON.stringify(foodLog));
            document.getElementById('foodSelect').value = '';
            document.getElementById('quantity').value = '';
            document.getElementById('unit').value = 'g';
            renderFoodLog();
            updateDashboard();
        }

        // Render Food Log
        function renderFoodLog() {
            const container = document.getElementById('foodTableContainer');
            if (foodLog.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🍽️</div><p>No foods logged yet. Start by adding your first meal!</p></div>';
                return;
            }

            let html = '<table class="food-table"><thead><tr><th>Food</th><th>Quantity</th><th>Unit</th><th>Calories</th><th>Action</th></tr></thead><tbody>';
            foodLog.forEach(entry => {
                const foodData = foodDatabase[entry.food];
                const caloriesPerUnit = foodData.calories;
                const totalCalories = Math.round((entry.quantity / 100) * caloriesPerUnit);

                html += `<tr>
                    <td>${entry.food}</td>
                    <td><input type="number" value="${entry.quantity}" onchange="updateQuantity(${entry.id}, this.value)"></td>
                    <td>${entry.unit}</td>
                    <td>${totalCalories}</td>
                    <td><button class="btn btn-danger" onclick="removeFood(${entry.id})">Remove</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Remove Food
        function removeFood(id) {
            foodLog = foodLog.filter(entry => entry.id !== id);
            localStorage.setItem('nutriFoodLog', JSON.stringify(foodLog));
            renderFoodLog();
            updateDashboard();
        }

        // Update Quantity
        function updateQuantity(id, newQuantity) {
            const entry = foodLog.find(e => e.id === id);
            if (entry) {
                entry.quantity = parseFloat(newQuantity);
                localStorage.setItem('nutriFoodLog', JSON.stringify(foodLog));
                updateDashboard();
            }
        }

        // Calculate Totals
        function calculateTotals() {
            const totals = {
                calories: 0,
                protein: 0,
                carbs: 0,
                fat: 0,
                fiber: 0,
                iron: 0,
                calcium: 0,
                vitaminC: 0,
                vitaminD: 0,
                vitaminB12: 0
            };

            foodLog.forEach(entry => {
                const foodData = foodDatabase[entry.food];
                const multiplier = entry.quantity / 100;

                Object.keys(totals).forEach(nutrient => {
                    totals[nutrient] += (foodData[nutrient] || 0) * multiplier;
                });
            });

            return totals;
        }

        // Update Dashboard
        function updateDashboard() {
            const totals = calculateTotals();
            const tdee = calculateTDEE();
            const { dietaryPreference } = profile;

            updateEnergyChart(totals.calories, tdee);
            updateMacroChart(totals);
            updateMacroBreakdown(totals);
            updateNutrientList(totals);
            updateDeficiencies(totals);
            updateExcesses(totals);
            updateRecommendations(totals, tdee, dietaryPreference);
        }

        // Energy Chart
        function updateEnergyChart(consumed, target) {
            const ctx = document.getElementById('energyChart');
            if (charts.energy) charts.energy.destroy();

            charts.energy = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Consumed', 'Remaining'],
                    datasets: [{
                        data: [Math.min(consumed, target), Math.max(target - consumed, 0)],
                        backgroundColor: [
                            'rgba(99, 102, 241, 0.8)',
                            'rgba(148, 163, 184, 0.2)'
                        ],
                        borderColor: [
                            'rgb(99, 102, 241)',
                            'rgb(148, 163, 184)'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#cbd5e1' }
                        }
                    }
                }
            });
        }

        // Macro Chart
        function updateMacroChart(totals) {
            const ctx = document.getElementById('macroChart');
            if (charts.macro) charts.macro.destroy();

            charts.macro = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Protein', 'Carbs', 'Fat'],
                    datasets: [{
                        data: [totals.protein * 4, totals.carbs * 4, totals.fat * 9],
                        backgroundColor: [
                            'rgba(16, 185, 129, 0.8)',
                            'rgba(99, 102, 241, 0.8)',
                            'rgba(245, 158, 11, 0.8)'
                        ],
                        borderColor: [
                            'rgb(16, 185, 129)',
                            'rgb(99, 102, 241)',
                            'rgb(245, 158, 11)'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#cbd5e1' }
                        }
                    }
                }
            });
        }

        // Macro Breakdown
        function updateMacroBreakdown(totals) {
            const tdee = calculateTDEE();
            const proteinCalories = totals.protein * 4;
            const carbsCalories = totals.carbs * 4;
            const fatCalories = totals.fat * 9;

            const html = `
                <div class="macro-box">
                    <div class="macro-label">Protein</div>
                    <div class="macro-value">${totals.protein.toFixed(1)}g</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min((proteinCalories / tdee) * 100, 100)}%"></div></div>
                    <div class="macro-target">Target: ${(tdee * 0.3 / 4).toFixed(0)}g</div>
                </div>
                <div class="macro-box">
                    <div class="macro-label">Carbs</div>
                    <div class="macro-value">${totals.carbs.toFixed(1)}g</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min((carbsCalories / tdee) * 100, 100)}%"></div></div>
                    <div class="macro-target">Target: ${(tdee * 0.45 / 4).toFixed(0)}g</div>
                </div>
                <div class="macro-box">
                    <div class="macro-label">Fat</div>
                    <div class="macro-value">${totals.fat.toFixed(1)}g</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min((fatCalories / tdee) * 100, 100)}%"></div></div>
                    <div class="macro-target">Target: ${(tdee * 0.25 / 9).toFixed(0)}g</div>
                </div>
            `;
            document.getElementById('macroBreakdown').innerHTML = html;
        }

        // Nutrient List
        function updateNutrientList(totals) {
            const nutrients = [
                { name: 'Fiber', value: totals.fiber, target: 25, unit: 'g' },
                { name: 'Iron', value: totals.iron, target: 18, unit: 'mg' },
                { name: 'Calcium', value: totals.calcium, target: 1000, unit: 'mg' },
                { name: 'Vitamin C', value: totals.vitaminC, target: 90, unit: 'mg' },
                { name: 'Vitamin D', value: totals.vitaminD, target: 20, unit: 'mcg' },
                { name: 'Vitamin B12', value: totals.vitaminB12, target: 2.4, unit: 'mcg' }
            ];

            let html = '';
            nutrients.forEach(nutrient => {
                const percentage = Math.min((nutrient.value / nutrient.target) * 100, 100);
                html += `
                    <div class="nutrient-item">
                        <div class="nutrient-name">
                            <div class="nutrient-name-label">${nutrient.name}</div>
                            <div class="nutrient-value">${nutrient.value.toFixed(1)} / ${nutrient.target} ${nutrient.unit}</div>
                        </div>
                        <div class="progress-bar" style="width: 200px;">
                            <div class="progress-fill" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('nutrientList').innerHTML = html;
        }

        // Update Deficiencies
        function updateDeficiencies(totals) {
            const nutrientTargets = {
                'Fiber': { current: totals.fiber, target: 25, unit: 'g' },
                'Iron': { current: totals.iron, target: 18, unit: 'mg' },
                'Calcium': { current: totals.calcium, target: 1000, unit: 'mg' },
                'Vitamin C': { current: totals.vitaminC, target: 90, unit: 'mg' },
                'Vitamin D': { current: totals.vitaminD, target: 20, unit: 'mcg' },
                'Vitamin B12': { current: totals.vitaminB12, target: 2.4, unit: 'mcg' }
            };

            const deficiencies = Object.entries(nutrientTargets)
                .map(([name, data]) => ({
                    name,
                    percentage: (data.current / data.target) * 100,
                    deficit: Math.max(0, data.target - data.current),
                    unit: data.unit
                }))
                .filter(item => item.percentage < 100)
                .sort((a, b) => a.percentage - b.percentage)
                .slice(0, 3);

            let html = deficiencies.length > 0 
                ? deficiencies.map(d => `
                    <div class="deficiency-item">
                        <span>${d.name}: ${(100 - d.percentage).toFixed(0)}% short</span>
                        <span>${d.deficit.toFixed(1)} ${d.unit}</span>
                    </div>
                `).join('')
                : '<div class="empty-state" style="padding: 20px;"><p>✓ All nutrients are meeting targets!</p></div>';

            document.getElementById('deficiencies').innerHTML = html;
        }

        // Update Excesses
        function updateExcesses(totals) {
            const nutrientTargets = {
                'Calories': { current: totals.calories, target: calculateTDEE() },
                'Fat': { current: totals.fat * 9, target: calculateTDEE() * 0.25 },
                'Sodium': { current: 0, target: 2300 }
            };

            const excesses = Object.entries(nutrientTargets)
                .map(([name, data]) => ({
                    name,
                    percentage: (data.current / data.target) * 100,
                    excess: Math.max(0, data.current - data.target)
                }))
                .filter(item => item.percentage > 100)
                .sort((a, b) => b.percentage - a.percentage)
                .slice(0, 3);

            let html = excesses.length > 0 
                ? excesses.map(e => `
                    <div class="excess-item">
                        <span>${e.name}: ${e.percentage.toFixed(0)}%</span>
                        <span>+${e.excess.toFixed(0)}</span>
                    </div>
                `).join('')
                : '<div class="empty-state" style="padding: 20px;"><p>✓ No major excesses detected!</p></div>';

            document.getElementById('excesses').innerHTML = html;
        }

        // Update Recommendations
        function updateRecommendations(totals, tdee, dietaryPreference) {
            const recommendations = [];

            // Energy recommendations
            if (totals.calories < tdee * 0.8) {
                recommendations.push({
                    type: 'warning',
                    text: `You're consuming ${Math.round(tdee - totals.calories)} fewer calories than needed. Consider adding more calorie-dense foods.`
                });
            } else if (totals.calories > tdee * 1.2) {
                recommendations.push({
                    type: 'warning',
                    text: `You're consuming ${Math.round(totals.calories - tdee)} more calories than needed. Try portion control.`
                });
            }

            // Protein recommendations
            const proteinTarget = tdee * 0.3 / 4;
            if (totals.protein < proteinTarget * 0.8) {
                const deficit = proteinTarget - totals.protein;
                const suggestions = [];
                if (dietaryPreference !== 'vegetarian') suggestions.push('Chicken, Fish, or Egg');
                if (dietaryPreference !== 'non-vegetarian') suggestions.push('Paneer or Dal');
                if (suggestions.length > 0) {
                    recommendations.push({
                        type: 'success',
                        text: `Add ${deficit.toFixed(0)}g more protein. Try: ${suggestions.join(', ')}`
                    });
                }
            }

            // Calcium recommendations
            if (totals.calcium < 800) {
                recommendations.push({
                    type: 'success',
                    text: `Increase calcium intake. Add Milk, Curd, or Paneer to your diet.`
                });
            }

            // Iron recommendations
            if (totals.iron < 15) {
                const suggestions = [];
                if (dietaryPreference !== 'vegetarian') suggestions.push('Chicken, Fish, or Egg');
                suggestions.push('Dal or Spinach');
                recommendations.push({
                    type: 'success',
                    text: `Iron is low. Include: ${suggestions.join(', ')}`
                });
            }

            // Vitamin D recommendations
            if (totals.vitaminD < 15) {
                const suggestions = [];
                if (dietaryPreference !== 'vegetarian') suggestions.push('Fish or Egg');
                suggestions.push('Spend 20-30 minutes in sunlight daily');
                recommendations.push({
                    type: 'success',
                    text: `Vitamin D is low. ${suggestions.join('. ')}`
                });
            }

            // B12 recommendations
            if (totals.vitaminB12 < 2) {
                const suggestions = [];
                if (dietaryPreference !== 'vegetarian') suggestions.push('Fish, Chicken, or Egg');
                if (dietaryPreference !== 'non-vegetarian') suggestions.push('Fortified cereals or supplements');
                recommendations.push({
                    type: 'success',
                    text: `Vitamin B12 is low. Include: ${suggestions.join(', ')}`
                });
            }

            // Fiber recommendations
            if (totals.fiber < 20) {
                recommendations.push({
                    type: 'success',
                    text: `Add ${(25 - totals.fiber).toFixed(0)}g more fiber. Include Oats, whole grain Bread, or Spinach.`
                });
            }

            if (recommendations.length === 0) {
                recommendations.push({
                    type: 'success',
                    text: '✓ Your nutrition looks balanced! Keep up the good work!'
                });
            }

            let html = recommendations.map(rec => `
                <div class="recommendation ${rec.type}">
                    ${rec.text}
                </div>
            `).join('');

            document.getElementById('recommendations').innerHTML = html;
        }

        // Switch Section
        function switchSection(sectionId) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');

            if (sectionId === 'dashboard') {
                updateDashboard();
            } else if (sectionId === 'logging') {
                renderFoodLog();
            }
        }

        // Reset Data
        function resetAllData() {
            if (confirm('Are you sure you want to reset all data? This cannot be undone.')) {
                localStorage.clear();
                foodLog = [];
                location.reload();
            }
        }

        // Initial render
        renderFoodLog();
    </script>
</body>
</html>
